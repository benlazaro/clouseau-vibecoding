name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build distribution zip
        shell: bash
        run: ./gradlew :clouseau-ui:distZipImage "-PappVersion=${{ steps.version.outputs.VERSION }}"

      - name: Rename zip with platform suffix
        shell: bash
        run: |
          mv clouseau-ui/build/distributions/clouseau-${{ steps.version.outputs.VERSION }}.zip \
             clouseau-ui/build/distributions/clouseau-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: clouseau-ui/build/distributions/clouseau-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.zip
          generate_release_notes: true
