# =============================================================================
# Clouseau Dark theme — FlatLaf properties file for ClouseauDarkLaf.
# Loaded automatically by FlatLaf when ClouseauDarkLaf is installed, because
# this file's name matches the LAF class name and the package is registered
# via FlatLaf.registerCustomDefaultsSource() in ClouseauApp.
#
# Keys prefixed with @ are FlatLaf palette variables.
# Keys prefixed with Clouseau. are app-level UI defaults read by ClouseauColors.
# All other keys override standard FlatLaf / Swing UI defaults.
# =============================================================================

# ── Core palette variables ────────────────────────────────────────────────────
@background          = #2c2c2c
@componentBackground = #282828
@foreground          = #B0B7C3
@disabledForeground  = #6B7280
@accentColor         = #4d4d4d

# ── Menu bar & popup ──────────────────────────────────────────────────────────
MenuBar.background            = @background
MenuBar.borderColor           = @background
PopupMenu.background          = @background

# ── Standard FlatLaf UI overrides ─────────────────────────────────────────────
Table.background              = #191919
Table.alternateRowColor       = #191919
TextArea.background           = #191919
TextPane.background           = #191919
Separator.foreground          = #272727
Component.borderColor         = #3C3C3C
TabbedPane.showTabSeparators  = true
TabbedPane.tabArc             = 10
TabbedPane.underlineHeight    = 2
ScrollBar.thumbArc            = 999
Component.focusWidth          = 0
MenuBar.selectionArc          = 8

# ── Surface / background hierarchy ───────────────────────────────────────────
# #2c2c2c  main window background  (set via @background above)
# #282828  component background    (set via @componentBackground above)
# #191919  mid-dark surface: table, detail pane  (set via standard keys above)
# #181818  deep-dark surface: loading overlay, scroll viewport
Clouseau.viewportBackground   = #181818
Clouseau.loadingBackground    = #181818

# ── Welcome panel key-badge chip ──────────────────────────────────────────────
Clouseau.keyBadgeFill         = #2D2F38
Clouseau.keyBadgeBorder       = #555566

# ── Foreground / text ─────────────────────────────────────────────────────────
Clouseau.mutedForeground      = #888888
Clouseau.accentBlue           = #82AAFF
Clouseau.detailKeyColor       = #6B9FD4
Clouseau.offColor             = #4A4A4A

# ── Log-level foreground colors ───────────────────────────────────────────────
Clouseau.level.TRACE          = #9E9E9E
Clouseau.level.DEBUG          = #66BB6A
Clouseau.level.INFO           = #29B6F6
Clouseau.level.WARN           = #FFA726
Clouseau.level.ERROR          = #EF5350
Clouseau.level.FATAL          = #FF4081
Clouseau.level.UNKNOWN        = #9E9E9E

# ── Status / feedback colors ──────────────────────────────────────────────────
Clouseau.status.ok            = #4CAF50
Clouseau.status.warn          = #FFA726
Clouseau.status.error         = #E57373

# ── Selection & search ────────────────────────────────────────────────────────
Clouseau.selectionBackground  = #C8D8E8
Clouseau.searchMatchBg        = #2E2800

# ── Row-highlight palette (8 slots, index 0-7) ───────────────────────────────
Clouseau.highlight.0          = #6B2020
Clouseau.highlight.1          = #6B4A20
Clouseau.highlight.2          = #5C5C1A
Clouseau.highlight.3          = #1A5C1A
Clouseau.highlight.4          = #1A5C5C
Clouseau.highlight.5          = #1A2E6B
Clouseau.highlight.6          = #3D1A6B
Clouseau.highlight.7          = #6B1A4A

# ── Logger-tree depth colors (depth 0 = top-level, wraps after depth 4) ──────
Clouseau.logger.depth.0       = #B0B7C3
Clouseau.logger.depth.1       = #82AAFF
Clouseau.logger.depth.2       = #C3E88D
Clouseau.logger.depth.3       = #FFCB6B
Clouseau.logger.depth.4       = #FF9580

# ── Plugin status colors ──────────────────────────────────────────────────────
Clouseau.plugin.enabled       = #66BB6A
Clouseau.plugin.disabled      = #FFA726
Clouseau.plugin.failed        = #EF5350

# ── Loading progress bar ──────────────────────────────────────────────────────
Clouseau.progressForeground   = #29B6F6
Clouseau.progressBackground   = #272727

# ── Detail panel flash animation ──────────────────────────────────────────────
Clouseau.flashPeakColor       = #6B7280

# ── Highlight navigation bar ──────────────────────────────────────────────────
Clouseau.highlightNav.selected   = #4A4A4A
Clouseau.highlightNav.unselected = #2A2A2A

# ── Favorites sidebar star icon ───────────────────────────────────────────────
Clouseau.starColor            = #FFD700

# ── JSON syntax-highlight palette (stored as Color, used as int rgb) ──────────
Clouseau.json.key             = #A6E22E
Clouseau.json.string          = #E6DB74
Clouseau.json.number          = #AE81FF
Clouseau.json.boolNull        = #66D9E8
Clouseau.json.punct           = #75715E
